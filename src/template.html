<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Document</title>
   </head>
   <body>
      <div class="body-wrapper">
         <div class="add-task-wrapper sidebar-header">
            <div class="add-task-text">Add Task</div>
            <div class="add-task-btn-wrapper">
               <button class="add-task-btn">
                  <div class="plus-circle-icon icon-div">
                     <svg
                        xmlns="http://www.w3.org/2000/svg"
                        viewBox="0 0 24 24"
                     >
                        <title>plus-circle</title>
                        <path
                           d="M17,13H13V17H11V13H7V11H11V7H13V11H17M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2Z"
                        />
                     </svg>
                  </div>
               </button>
            </div>
         </div>
         <!-- ! sidebar -->
         <div class="sidebar">
            <div class="sidebar-top">
               <div class="app-name">TODO</div>
               <div class="menu-icon icon-div">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                     <title>menu</title>
                     <path d="M3,6H21V8H3V6M3,11H21V13H3V11M3,16H21V18H3V16Z" />
                  </svg>
               </div>
            </div>
            <div class="sidebar-bottom">
               <div class="sidebar-main">
                  <div class="today sidebar-div">
                     <div class="sun-icon">
                        <svg
                           xmlns="http://www.w3.org/2000/svg"
                           viewBox="0 0 24 24"
                        >
                           <title>white-balance-sunny</title>
                           <path
                              d="M3.55 19.09L4.96 20.5L6.76 18.71L5.34 17.29M12 6C8.69 6 6 8.69 6 12S8.69 18 12 18 18 15.31 18 12C18 8.68 15.31 6 12 6M20 13H23V11H20M17.24 18.71L19.04 20.5L20.45 19.09L18.66 17.29M20.45 5L19.04 3.6L17.24 5.39L18.66 6.81M13 1H11V4H13M6.76 5.39L4.96 3.6L3.55 5L5.34 6.81L6.76 5.39M1 13H4V11H1M13 20H11V23H13"
                           />
                        </svg>
                     </div>
                     <div class="today-text">Today</div>
                  </div>
                  <div class="completed sidebar-div">
                     <div class="task-icon">
                        <svg
                           xmlns="http://www.w3.org/2000/svg"
                           viewBox="0 0 24 24"
                        >
                           <title>check-circle-outline</title>
                           <path
                              d="M12 2C6.5 2 2 6.5 2 12S6.5 22 12 22 22 17.5 22 12 17.5 2 12 2M12 20C7.59 20 4 16.41 4 12S7.59 4 12 4 20 7.59 20 12 16.41 20 12 20M16.59 7.58L10 14.17L7.41 11.59L6 13L10 17L18 9L16.59 7.58Z"
                           />
                        </svg>
                     </div>
                     <div class="completed-text">Completed</div>
                  </div>
               </div>
               <div class="sidebar-projects">
                  <div class="sidebar-projects-top sidebar-header">
                     <div class="projects-title">My Projects</div>
                     <button class="add-project-btn">
                        <div class="plus-icon icon-div">
                           <svg
                              xmlns="http://www.w3.org/2000/svg"
                              viewBox="0 0 24 24"
                           >
                              <title>plus</title>
                              <path
                                 d="M19,13H13V19H11V13H5V11H11V5H13V11H19V13Z"
                              />
                           </svg>
                        </div>
                     </button>
                  </div>
                  <div class="project sidebar-div">Placeholder</div>
                  <div class="project sidebar-div">Placeholder</div>
                  <div class="project sidebar-div">Placeholder</div>
               </div>
            </div>
         </div>
         <div class="task-view">
            <div class="view-title">Project Title</div>
            <div class="task-container">
               <!-- <div class="task">
                  <div class="checkbox"></div>
                  <div class="task-content">task</div>
               </div> -->
            </div>
         </div>
      </div>
   </body>
</html>
